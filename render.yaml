services:
  - type: web
    name: pothole-detector
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pothole-detector-db
          property: connectionString
      - key: INGEST_TOKEN
        sync: false
      - key: ALLOW_RESET
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: DETECTION_THRESHOLD
        value: "0.5"

databases:
  - name: pothole-detector-db
    plan: free
    region: singapore
